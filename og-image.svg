  <rect x="786" y="350" width="258" height="44" rx="12" fill="rgba(255,255,255,0.7)"/>
  <text x="806" y="368" font-family="Arial, sans-serif" font-size="12" fill="#2A1E18" font-weight="700">이번 주의 아기</text>
  <text x="806" y="386" font-family="Arial, sans-serif" font-size="11" fill="#6A5A50">양배추 크기 · 약 38cm</text>

  <!-- 칩 -->
  <rect x="786" y="406" width="72" height="28" rx="14" fill="rgba(200,133,106,0.2)"/>
  <text x="822" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#B05C40" text-anchor="middle">AI 분석</text>
  <rect x="866" y="406" width="72" height="28" rx="14" fill="rgba(152,128,168,0.2)"/>
  <text x="902" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#9880A8" text-anchor="middle">사진 일기</text>
  <rect x="946" y="406" width="84" height="28" rx="14" fill="rgba(122,152,120,0.2)"/>
  <text x="988" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#7A9878" text-anchor="middle">공동양육</text>

  <!-- 하단 도메인 -->
  <text x="915" y="536" font-family="Arial, sans-serif" font-size="19" font-weight="600" fill="#9880A8" text-anchor="middle">todak-app.com</text>
