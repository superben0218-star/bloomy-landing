<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0E4D7"/>
      <stop offset="100%" stop-color="#E8D8EE"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B05C40"/>
      <stop offset="100%" stop-color="#9880A8"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8856A"/>
      <stop offset="100%" stop-color="#9880A8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 (우상단) -->
  <circle cx="1080" cy="-60" r="320" fill="rgba(200,133,106,0.13)"/>
  <circle cx="1150" cy="580" r="220" fill="rgba(152,128,168,0.11)"/>
  <!-- 장식 원 (좌하단) -->
  <circle cx="-60" cy="520" r="260" fill="rgba(200,133,106,0.10)"/>
  <circle cx="180" cy="-40" r="160" fill="rgba(152,128,168,0.09)"/>

  <!-- 중앙 카드 영역 -->
  <rect x="60" y="60" width="1080" height="510" rx="36" fill="rgba(255,255,255,0.52)"/>

  <!-- 로고 + 태그라인 (좌측) -->
  <!-- TODAK 브랜드명 -->
  <text x="120" y="220" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">TODAK</text>

  <!-- 구분선 -->
  <rect x="120" y="248" width="72" height="4" rx="2" fill="#C8856A" opacity="0.5"/>

  <!-- 메인 카피 -->
  <text x="120" y="316" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#2A1E18">우리 아이의 모든 순간을</text>
  <text x="120" y="366" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#2A1E18">담아두는 곳</text>

  <!-- 서브 카피 -->
  <text x="122" y="430" font-family="Arial, sans-serif" font-size="22" fill="#6A5A50">임신부터 성장까지, 소중한 기억이 사라지기 전에</text>
  <text x="122" y="462" font-family="Arial, sans-serif" font-size="22" fill="#6A5A50">TODAK가 함께 기록합니다.</text>

  <!-- 기능 뱃지들 -->
  <rect x="120" y="494" width="130" height="42" rx="21" fill="rgba(200,133,106,0.15)"/>
  <text x="185" y="521" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#B05C40" text-anchor="middle">AI 분석</text>

  <rect x="264" y="494" width="130" height="42" rx="21" fill="rgba(152,128,168,0.15)"/>
  <text x="329" y="521" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9880A8" text-anchor="middle">회고록</text>

  <rect x="408" y="494" width="148" height="42" rx="21" fill="rgba(122,152,120,0.15)"/>
  <text x="482" y="521" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7A9878" text-anchor="middle">공동 양육</text>

  <!-- 우측 폰 목업 -->
  <!-- 폰 프레임 -->
  <rect x="760" y="88" width="310" height="454" rx="44" fill="#19192C"/>
  <rect x="772" y="100" width="286" height="430" rx="36" fill="#F9F4EE"/>
  <!-- 노치 -->
  <rect x="866" y="100" width="118" height="28" rx="0 0 14 14" fill="#19192C"/>

  <!-- 폰 콘텐츠 -->
  <text x="915" y="168" font-family="Arial, sans-serif" font-size="13" fill="#6A5A50" text-anchor="middle">임신 210일 중</text>
  <text x="915" y="198" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2A1E18" text-anchor="middle">예쁜 아기를</text>
  <text x="915" y="222" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2A1E18" text-anchor="middle">만나기까지</text>

  <!-- D-day 카드 -->
  <rect x="786" y="240" width="258" height="96" rx="16" fill="rgba(200,133,106,0.18)"/>
  <text x="806" y="265" font-family="Arial, sans-serif" font-size="12" fill="#6A5A50" font-weight="600">출산 예정일까지</text>
  <text x="806" y="308" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#B05C40">D-84</text>
  <rect x="806" y="322" width="180" height="4" rx="2" fill="rgba(160,100,60,0.15)"/>
  <rect x="806" y="322" width="126" height="4" rx="2" fill="url(#badgeBg)" opacity="0.7"/>

